name: Bug report
description: Report a problem with a VyNy app
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform did the problem occur on?
      options:
        - VyNy for Android
        - VyNy for iOS
        - VyNy for Mac (Lab — as-is)
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: The version number (e.g. from "About VyNy")
      placeholder: e.g. 1.0.0 (42)
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: e.g. macOS 14.5
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the problem, in order.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or screenshots (optional).
    validations:
      required: false
